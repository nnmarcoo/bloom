name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.variant }})
    runs-on: ${{ matrix.runner }}
    env:
      ARTIFACT: bloom-${{ matrix.platform }}${{ matrix.suffix }}.${{ matrix.ext }}
      MSI: bloom-${{ matrix.platform }}${{ matrix.suffix }}.msi
    strategy:
      fail-fast: false
      matrix:
        os: [linux, macos, windows]
        variant: [minimal, heif, full]
        include:
          - os: linux
            runner: ubuntu-24.04
            platform: linux-x86_64
            ext: tar.gz
          - os: macos
            runner: macos-14
            platform: macos-arm64
            ext: dmg
          - os: windows
            runner: windows-latest
            platform: windows-x86_64
            ext: zip
          - variant: minimal
            features: ""
            suffix: "-minimal"
          - variant: heif
            features: "heif"
            suffix: "-heif"
          - variant: full
            features: "heif,video"
            suffix: ""

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config
          if [[ "$FEATURES" == *heif* ]]; then
            sudo apt-get install -y libheif-dev libdav1d-dev
          fi
          if [[ "$FEATURES" == *video* ]]; then
            sudo apt-get install -y clang libclang-dev libasound2-dev
            curl -fL -o /tmp/ffmpeg.tar.xz \
              https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linux64-gpl-shared-8.1.tar.xz
            mkdir -p "$HOME/ffmpeg"
            tar -xf /tmp/ffmpeg.tar.xz -C "$HOME/ffmpeg" --strip-components=1
            sed -i "s|^prefix=.*|prefix=$HOME/ffmpeg|" "$HOME/ffmpeg/lib/pkgconfig/"*.pc
            echo "FFMPEG_DIR=$HOME/ffmpeg" >> "$GITHUB_ENV"
            echo "PKG_CONFIG_PATH=$HOME/ffmpeg/lib/pkgconfig" >> "$GITHUB_ENV"
            echo 'RUSTFLAGS=-C link-arg=-Wl,-rpath,$ORIGIN/lib -C link-arg=-Wl,--disable-new-dtags' >> "$GITHUB_ENV"
          fi

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          if [[ "$FEATURES" == *heif* ]]; then
            brew install libheif dav1d
          fi
          if [[ "$FEATURES" == *video* ]]; then
            brew install ffmpeg
          fi

      - name: Cache vcpkg packages (Windows)
        if: matrix.os == 'windows' && contains(matrix.features, 'heif')
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-static-md-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: vcpkg-x64-windows-static-md-

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          VCPKG_MAX_CONCURRENCY: 2
          FEATURES: ${{ matrix.features }}
        run: |
          choco install pkgconfiglite -y
          if ($env:FEATURES -like "*heif*") {
            vcpkg integrate install
            vcpkg install libheif:x64-windows-static-md dav1d:x64-windows-static-md
            $vcpkgInstalled = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
            echo "LIBHEIF_DIR=$vcpkgInstalled" >> $env:GITHUB_ENV
            echo "PKG_CONFIG_PATH=$vcpkgInstalled\lib\pkgconfig" >> $env:GITHUB_ENV
          }
          if ($env:FEATURES -like "*video*") {
            echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
            Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-gpl-shared-8.1.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
            Expand-Archive -Path "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath "$env:RUNNER_TEMP"
            $extracted = (Get-ChildItem -Directory "$env:RUNNER_TEMP" -Filter "ffmpeg-n8.1*").FullName
            echo "FFMPEG_DIR=$extracted" >> $env:GITHUB_ENV
          }

      - name: Set macOS deployment target
        if: matrix.os == 'macos'
        run: echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}

      - name: Package (Linux)
        if: matrix.os == 'linux'
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          mkdir -p dist
          cp target/release/bloom dist/
          if [[ "$FEATURES" == *video* ]]; then
            mkdir -p dist/lib
            cp -a "$FFMPEG_DIR"/lib/*.so* dist/lib/
          fi
          tar -czf "$ARTIFACT" -C dist .

      - name: Package (macOS)
        if: matrix.os == 'macos'
        shell: bash
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          APP="bloom.app"
          BINARY="$APP/Contents/MacOS/bloom"
          FRAMEWORKS="$APP/Contents/Frameworks"
          BREW_PREFIX="$(brew --prefix)"

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0"
          fi

          if [[ "$FEATURES" == *heif* ]]; then
            HEIF_CONTENT='<string>public.heic</string><string>public.heif</string><string>public.avif</string>'
            HEIF_EXT='<string>heic</string><string>heif</string><string>avif</string>'
          else
            HEIF_CONTENT=""
            HEIF_EXT=""
          fi

          mkdir -p "$APP/Contents/MacOS" "$FRAMEWORKS"
          cp target/release/bloom "$BINARY"

          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>bloom</string>
            <key>CFBundleIdentifier</key><string>com.bloom.app</string>
            <key>CFBundleName</key><string>Bloom</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>$VERSION</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>CFBundleDocumentTypes</key>
            <array>
              <dict>
                <key>CFBundleTypeName</key><string>Image</string>
                <key>CFBundleTypeRole</key><string>Viewer</string>
                <key>LSHandlerRank</key><string>Alternate</string>
                <key>LSItemContentTypes</key>
                <array>
                  <string>public.jpeg</string>
                  <string>public.png</string>
                  <string>com.compuserve.gif</string>
                  <string>com.microsoft.bmp</string>
                  <string>public.tiff</string>
                  <string>public.svg-image</string>
                  <string>com.adobe.photoshop</string>
                  <string>public.webp</string>
                </array>
                <key>CFBundleTypeExtensions</key>
                <array>
                  <string>jpg</string><string>jpeg</string>
                  <string>png</string><string>gif</string>
                  <string>bmp</string><string>tif</string><string>tiff</string>
                  <string>webp</string><string>svg</string><string>svgz</string>
                  <string>psd</string><string>ico</string><string>tga</string>
                  <string>dds</string>
                </array>
              </dict>
              <dict>
                <key>CFBundleTypeName</key><string>Image</string>
                <key>CFBundleTypeRole</key><string>Viewer</string>
                <key>LSHandlerRank</key><string>Default</string>
                <key>LSItemContentTypes</key>
                <array>
                  $HEIF_CONTENT
                </array>
                <key>CFBundleTypeExtensions</key>
                <array>
                  $HEIF_EXT
                  <string>jxl</string><string>qoi</string>
                  <string>hdr</string><string>exr</string>
                </array>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

          bundle_dylib() {
            local lib="$1"
            local name
            name="$(basename "$lib")"
            [ -f "$FRAMEWORKS/$name" ] && return
            cp "$lib" "$FRAMEWORKS/$name"
            while IFS= read -r dep; do
              install_name_tool -change "$dep" "@executable_path/../Frameworks/$(basename "$dep")" "$FRAMEWORKS/$name"
              bundle_dylib "$dep"
            done < <(otool -L "$FRAMEWORKS/$name" | grep "$BREW_PREFIX" | awk '{print $1}')
          }

          while IFS= read -r lib; do
            install_name_tool -change "$lib" "@executable_path/../Frameworks/$(basename "$lib")" "$BINARY"
            bundle_dylib "$lib"
          done < <(otool -L "$BINARY" | grep "$BREW_PREFIX" | awk '{print $1}')

          shopt -s nullglob
          for dylib in "$FRAMEWORKS"/*.dylib; do
            codesign -f -s "-" "$dylib"
          done
          codesign -f -s "-" "$BINARY"

          hdiutil create -volname "Bloom" -srcfolder "$APP" -ov -format UDZO "$ARTIFACT"

      - uses: taiki-e/install-action@v2
        if: matrix.os == 'windows'
        with:
          tool: cargo-wix

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          $heif  = if ($env:FEATURES -like "*heif*")  { "true" } else { "false" }
          $video = if ($env:FEATURES -like "*video*") { "true" } else { "false" }
          $zipItems = @("target\release\bloom.exe")
          $wixArgs = @("--no-build", "--nocapture", "-C", "-dHeif=$heif", "-C", "-dVideo=$video")
          if ($video -eq "true") {
            $dllDir = "$env:RUNNER_TEMP\ffmpeg_dlls"
            New-Item -ItemType Directory -Force -Path $dllDir | Out-Null
            Copy-Item "$env:FFMPEG_DIR\bin\*.dll" -Destination $dllDir
            & "$env:WIX\bin\heat.exe" dir "$dllDir" -nologo -cg FfmpegDlls -dr Bin -var var.FfmpegDllDir -ag -srd -sreg -scom -out wix\ffmpeg.wxs
            $wixArgs += @("-C", "-dFfmpegDllDir=$dllDir")
            $zipItems += (Get-ChildItem "$dllDir\*.dll").FullName
          }
          cargo wix @wixArgs --output $env:MSI
          Compress-Archive -Path $zipItems -DestinationPath $env:ARTIFACT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'windows'
        with:
          name: ${{ env.MSI }}
          path: ${{ env.MSI }}

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bloom-*.tar.gz
            bloom-*.dmg
            bloom-*.zip
            bloom-*.msi
