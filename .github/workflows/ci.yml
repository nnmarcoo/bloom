name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libheif-dev libdav1d-dev clang libclang-dev libasound2-dev
          ffmpeg_url=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases?per_page=20" \
            | grep -oE '"browser_download_url": *"[^"]*linux64-gpl-shared-8\.1\.tar\.xz"' \
            | grep -oE 'https://[^"]*' | head -n1)
          if [ -z "$ffmpeg_url" ]; then
            echo "::error::could not resolve an n8.1 gpl-shared FFmpeg build" >&2
            exit 1
          fi
          echo "Downloading $ffmpeg_url"
          curl -fL -o /tmp/ffmpeg.tar.xz "$ffmpeg_url"
          mkdir -p "$HOME/ffmpeg"
          tar -xf /tmp/ffmpeg.tar.xz -C "$HOME/ffmpeg" --strip-components=1
          sed -i "s|^prefix=.*|prefix=$HOME/ffmpeg|" "$HOME/ffmpeg/lib/pkgconfig/"*.pc
          echo "FFMPEG_DIR=$HOME/ffmpeg" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$HOME/ffmpeg/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/ffmpeg/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --features heif,av -- -D warnings

      - name: test
        run: cargo test --features heif,av
